<title>Etymology Tree — prototype</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ECEFF4; --surface: #FFFFFF; --canvas: #F7F9FB; --sunk: #E3E8EF;
    --line: #D3DBE4; --wire: #A9B8C7; --guide: #E8EDF2;
    --ink: #131C25; --muted: #58687A; --faint: #8996A5;
    --accent: #9A6B14; --accent-soft: #F5E7C8;
    --fam-gem: #3F6E9E;  --fam-itc: #9E5241;  --fam-grk: #4C7D5A;
    --fam-cel: #6A5C99;  --fam-bsl: #3D7C88;  --fam-iir: #8B5F88;
    --fam-hyx: #7A6B3E;  --fam-ana: #5E6B7C;  --fam-toc: #916350;
    --fam-urj: #4E7468;  --fam-oth: #6B7885;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua",
             Charter, Georgia, "Times New Roman", serif;
    --sans:  ui-sans-serif, -apple-system, "Segoe UI Variable Text", "Segoe UI",
             system-ui, "Helvetica Neue", sans-serif;
    --mono:  ui-monospace, "Cascadia Mono", Consolas, "SF Mono", Menlo, monospace;
    --xs: .74rem;  --sm: .82rem;  --md: .93rem;  --lg: 1.15rem;  --xl: 1.6rem;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0C1219; --surface: #151E27; --canvas: #101822; --sunk: #0F1720;
      --line: #263543; --wire: #435A6C; --guide: #1A242F;
      --ink: #E4ECF4; --muted: #91A4B6; --faint: #6A7B8C;
      --accent: #DCAC4C; --accent-soft: #3C3117;
      --fam-gem: #74A5D4;  --fam-itc: #D48875;  --fam-grk: #80B48E;
      --fam-cel: #A092CE;  --fam-bsl: #70B2BD;  --fam-iir: #C094BD;
      --fam-hyx: #AFA073;  --fam-ana: #93A0B1;  --fam-toc: #C69885;
      --fam-urj: #83A99D;  --fam-oth: #9FACB9;
    }
  }
  :root[data-theme="light"] {
    --bg: #ECEFF4; --surface: #FFFFFF; --canvas: #F7F9FB; --sunk: #E3E8EF;
    --line: #D3DBE4; --wire: #A9B8C7; --guide: #E8EDF2;
    --ink: #131C25; --muted: #58687A; --faint: #8996A5;
    --accent: #9A6B14; --accent-soft: #F5E7C8;
    --fam-gem: #3F6E9E;  --fam-itc: #9E5241;  --fam-grk: #4C7D5A;
    --fam-cel: #6A5C99;  --fam-bsl: #3D7C88;  --fam-iir: #8B5F88;
    --fam-hyx: #7A6B3E;  --fam-ana: #5E6B7C;  --fam-toc: #916350;
    --fam-urj: #4E7468;  --fam-oth: #6B7885;
  }
  :root[data-theme="dark"] {
    --bg: #0C1219; --surface: #151E27; --canvas: #101822; --sunk: #0F1720;
    --line: #263543; --wire: #435A6C; --guide: #1A242F;
    --ink: #E4ECF4; --muted: #91A4B6; --faint: #6A7B8C;
    --accent: #DCAC4C; --accent-soft: #3C3117;
    --fam-gem: #74A5D4;  --fam-itc: #D48875;  --fam-grk: #80B48E;
    --fam-cel: #A092CE;  --fam-bsl: #70B2BD;  --fam-iir: #C094BD;
    --fam-hyx: #AFA073;  --fam-ana: #93A0B1;  --fam-toc: #C69885;
    --fam-urj: #83A99D;  --fam-oth: #9FACB9;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: var(--md); line-height: 1.5;
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }
  .app { height: 100%; display: grid; grid-template-rows: auto auto 1fr; min-height: 0; }

  .top {
    display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap;
    padding: .7rem clamp(.9rem, 2.5vw, 1.6rem);
    border-bottom: 1px solid var(--line); background: var(--surface);
  }
  h1 {
    font-family: var(--serif); font-size: var(--xl); font-weight: 600;
    margin: 0; letter-spacing: -.015em; line-height: 1; white-space: nowrap;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .credit { margin-left: auto; font-size: var(--xs); color: var(--faint); text-align: right; }
  .credit a { color: var(--muted); }

  .search { position: relative; flex: 1 1 24rem; max-width: 36rem; min-width: 14rem; }
  .search input {
    width: 100%; font-family: var(--serif); font-size: var(--lg); color: var(--ink);
    background: var(--canvas); border: 1px solid var(--line); border-radius: 6px;
    padding: .4rem .7rem .4rem 2rem;
  }
  .search input::placeholder { color: var(--faint); font-family: var(--sans); font-size: var(--md); }
  .search input:focus { border-color: var(--accent); outline: none; }
  .search .icon {
    position: absolute; left: .65rem; top: 50%; transform: translateY(-50%);
    color: var(--faint); pointer-events: none;
  }
  .results {
    position: absolute; z-index: 20; top: calc(100% + .3rem); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
    box-shadow: 0 12px 34px rgba(8, 18, 28, .18);
    max-height: 62vh; overflow: auto; padding: .25rem;
  }
  .results:empty { display: none; }
  .res {
    display: flex; align-items: baseline; gap: .55rem; width: 100%;
    padding: .3rem .5rem; border: 0; border-radius: 4px; background: transparent;
    cursor: pointer; text-align: left; color: inherit;
  }
  .res:hover, .res.cur { background: var(--sunk); }
  .res .w { font-family: var(--serif); font-size: var(--md); }
  .res .w.recon { font-style: italic; }
  .res .lg { font-size: var(--xs); color: var(--muted); white-space: nowrap; }
  .res .gl {
    font-size: var(--xs); color: var(--faint); margin-left: auto;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 44%;
  }
  .res .swatch { width: .45rem; height: .45rem; border-radius: 2px; background: var(--c); flex: none; }
  .res .cnt {
    font-family: var(--mono); font-size: var(--xs); color: var(--faint);
    margin-left: auto; white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .res .gl + .cnt { margin-left: .6rem; }
  .nores { padding: .5rem .6rem; font-size: var(--sm); color: var(--faint); }

  .picker {
    display: flex; flex-wrap: wrap; gap: .3rem; align-items: center;
    padding: .5rem clamp(.9rem, 2.5vw, 1.6rem);
    border-bottom: 1px solid var(--line); background: var(--surface);
  }
  .picker .lab {
    font-family: var(--mono); font-size: var(--xs); letter-spacing: .1em;
    text-transform: uppercase; color: var(--faint); margin-right: .3rem;
  }
  .chip {
    font-family: var(--serif); font-size: var(--md); background: transparent;
    color: var(--ink); border: 1px solid var(--line); border-radius: 999px;
    padding: .14rem .66rem; cursor: pointer;
    transition: border-color .14s, color .14s, background .14s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip[aria-pressed="true"] {
    background: var(--accent); border-color: var(--accent);
    color: var(--surface); font-weight: 600;
  }
  .chip .code {
    font-family: var(--mono); font-size: .7em; color: var(--faint);
    margin-right: .28rem; text-transform: uppercase; letter-spacing: .06em;
  }
  .chip[aria-pressed="true"] .code { color: inherit; opacity: .8; }

  .main { display: grid; grid-template-columns: minmax(0, 1fr) 20.5rem; min-height: 0; }
  @media (max-width: 900px) { .main { grid-template-columns: minmax(0, 1fr); } }
  .stage { display: grid; grid-template-rows: auto 1fr; min-height: 0; min-width: 0; }

  .bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: .4rem 1rem;
    padding: .42rem clamp(.9rem, 2.5vw, 1.6rem);
    border-bottom: 1px solid var(--line); background: var(--surface);
  }
  .route { display: flex; align-items: baseline; flex-wrap: wrap; gap: .1rem; min-width: 0; }
  .route .arrow { color: var(--faint); margin: 0 .18rem; font-size: .78em; }
  .route .step {
    font-family: var(--serif); font-size: var(--lg); line-height: 1.2;
    background: transparent; border: 0; padding: .05rem .2rem; border-radius: 3px;
    color: var(--ink); cursor: pointer;
  }
  .route .step:hover { background: var(--sunk); color: var(--accent); }
  .route .step.recon { font-style: italic; }
  .route .step.root { color: var(--accent); }
  .route .step.you { font-weight: 600; color: var(--accent); }
  .route .part {
    font-family: var(--serif); font-size: .82em; line-height: 1.2;
    background: transparent; border: 0; padding: .05rem .15rem;
    color: var(--muted); cursor: pointer; align-self: center;
  }
  .route .part:hover { color: var(--accent); text-decoration: underline; }
  .legend h3 {
    font-family: var(--mono); font-size: var(--xs); font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--faint);
    margin: 0 0 .1rem; width: 100%;
  }
  .legend .lkey { gap: .4rem; }
  .legend .lkey svg { overflow: visible; }
  .crumb {
    font-size: var(--xs); color: var(--muted); background: var(--sunk);
    border: 1px solid var(--line); border-radius: 4px; padding: .1rem .45rem; cursor: pointer;
  }
  .crumb:hover { border-color: var(--accent); color: var(--accent); }
  .spacer { margin-left: auto; }
  .controls { display: flex; gap: .28rem; }
  .btn {
    font-family: var(--sans); font-size: var(--xs); color: var(--muted);
    background: transparent; border: 1px solid var(--line);
    border-radius: 4px; padding: .14rem .5rem; cursor: pointer; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn[aria-pressed="true"] { background: var(--sunk); color: var(--ink); border-color: var(--wire); }
  .meta { font-family: var(--mono); font-size: var(--xs); color: var(--faint); font-variant-numeric: tabular-nums; }


  .canvas { overflow: auto; min-height: 0; background: var(--canvas); }
  svg { display: block; }
  .guide { stroke: var(--guide); stroke-width: 1; }
  .link { fill: none; stroke-linecap: round; }
  .link.on { stroke: var(--accent) !important; }
  /* one pattern per relation, named once in the legend */
  .link.k0 { }                                  /* inherited  — solid        */
  .link.k1 { stroke-dasharray: 4 3.5; }         /* borrowed   — dashed       */
  .link.k2 { stroke-dasharray: 1 4; }           /* root       — dotted       */
  .link.k3 { stroke-dasharray: 9 4; }           /* derived    — long dash    */
  /* a compound's second parent: the two branches genuinely converge here */
  .merge {
    fill: none; stroke: var(--accent); stroke-width: 1.2;
    stroke-dasharray: 2 3; stroke-opacity: .75;
  }
  /* the converging joins, and the word they arrive at */
  .join {
    fill: none; stroke: var(--accent); stroke-width: 2.6;
    stroke-opacity: .95; stroke-linecap: round;
  }
  .wordplate {
    fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1.4;
  }
  .wordknot { fill: var(--accent); stroke: var(--accent); stroke-width: 2; }
  .wordlabel {
    font-family: var(--serif); font-size: 21px; font-weight: 600;
    fill: var(--accent); dominant-baseline: middle;
    paint-order: stroke fill; stroke: var(--canvas); stroke-width: 3px;
    stroke-linejoin: round;
  }
  .wordsub {
    font-size: 10.5px; fill: var(--muted); dominant-baseline: middle;
  }
  .lbl.ghost {
    font-size: 12.5px; fill: var(--accent); fill-opacity: .9; cursor: pointer;
  }
  .lbl.ghost:hover { text-decoration: underline; fill-opacity: 1; }
  .ghostdot { stroke-dasharray: 1.5 1.5; }
  .dot { stroke-width: 1.4; }

  /* Links have to cross the gap between columns, which is exactly where labels
     sit. Painting a canvas-coloured stroke under each glyph keeps the word
     readable wherever a branch runs behind it. */
  .lbl, .sub, .more, .morerow {
    paint-order: stroke fill;
    stroke: var(--canvas); stroke-width: 3.5px; stroke-linejoin: round;
  }
  .lbl { font-family: var(--serif); font-size: 14px; fill: var(--ink); dominant-baseline: middle; }
  .lbl.recon { font-style: italic; }
  .lbl.on { fill: var(--accent); font-weight: 600; }
  .lbl.you { font-size: 16.5px; }
  .sub { font-family: var(--sans); font-size: 10.5px; fill: var(--faint); dominant-baseline: middle; }
  .more { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); dominant-baseline: middle; }
  .morerow {
    font-family: var(--sans); font-size: 11.5px; fill: var(--muted);
    dominant-baseline: middle; cursor: pointer;
  }
  .morerow:hover { fill: var(--accent); text-decoration: underline; }
  .hit { fill: transparent; cursor: pointer; }
  .halo { opacity: 0; fill: var(--accent-soft); }
  .halo.sel { opacity: 1; }
  .hit:hover ~ .halo { opacity: .5; }

  .detail {
    border-left: 1px solid var(--line); background: var(--surface);
    overflow: auto; padding: 1rem 1.1rem 2rem; min-height: 0;
  }
  @media (max-width: 900px) { .detail { border-left: none; border-top: 1px solid var(--line); } }
  .detail h2 {
    font-family: var(--mono); font-size: var(--xs); font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase; color: var(--faint); margin: 0 0 .8rem;
  }
  .placeholder { color: var(--faint); font-size: var(--sm); }
  .d-form { font-family: var(--serif); font-size: 1.8rem; line-height: 1.15; margin: 0 0 .15rem; word-break: break-word; }
  .d-form.recon { font-style: italic; }
  .d-lang { color: var(--muted); font-size: var(--sm); }
  .d-lang .swatch {
    display: inline-block; width: .5rem; height: .5rem; border-radius: 2px;
    background: var(--c); margin-right: .4rem;
  }
  .d-gloss {
    margin: .8rem 0 0; padding: .55rem .7rem; background: var(--sunk);
    border-radius: 4px; font-size: var(--sm); color: var(--ink);
  }
  .d-sec { margin-top: 1.2rem; }
  .d-sec h3 {
    font-family: var(--mono); font-size: var(--xs); font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--faint); margin: 0 0 .45rem;
  }
  .lineage { display: flex; flex-direction: column; gap: .1rem; }
  .lineage button {
    display: flex; align-items: baseline; gap: .45rem; width: 100%;
    background: transparent; border: 0; padding: .18rem .3rem; border-radius: 3px;
    cursor: pointer; text-align: left; color: inherit;
    font-family: var(--serif); font-size: var(--md);
  }
  .lineage button:hover { background: var(--sunk); }
  .lineage button .who { font-family: var(--sans); font-size: var(--xs); color: var(--faint); margin-left: auto; }
  .lineage button.here { color: var(--accent); font-weight: 600; }
  .lineage button.recon { font-style: italic; }
  .facts { display: grid; grid-template-columns: auto 1fr; gap: .25rem .8rem; font-size: var(--sm); }
  .facts dt { color: var(--faint); }
  .facts dd { margin: 0; font-variant-numeric: tabular-nums; }
  .acts { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: 1rem; }
  .acts .btn { padding: .28rem .6rem; font-size: var(--sm); }
  .acts .primary { border-color: var(--accent); color: var(--accent); }
  .legend {
    display: flex; flex-wrap: wrap; gap: .3rem .8rem; margin-top: 1.4rem;
    padding-top: .9rem; border-top: 1px solid var(--line);
    font-size: var(--xs); color: var(--muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: .3rem; }
  .legend i { width: .5rem; height: .5rem; border-radius: 2px; background: var(--c); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<div class="app">
  <div class="top">
    <h1>Where words <em>branched</em></h1>
    <div class="search">
      <span class="icon" aria-hidden="true">⌕</span>
      <input id="q" type="search" autocomplete="off" spellcheck="false"
             placeholder="Search a million words — accents optional" aria-label="Search words">
      <div class="results" id="results" role="listbox"></div>
    </div>
    <span class="credit">
      <a href="https://www.wiktionary.org/">Wiktionary</a> via
      <a href="https://kaikki.org">kaikki.org</a> · CC BY-SA 3.0
    </span>
  </div>

  <nav class="picker" id="picker" aria-label="Example words"><span class="lab">Try</span></nav>

  <div class="main">
    <div class="stage">
      <div class="bar">
        <div class="route" id="route"></div>
        <div class="spacer"></div>
        <div class="controls">
          <button class="btn" type="button" id="zoomout" title="Zoom out">&minus;</button>
          <button class="btn" type="button" id="zoomin" title="Zoom in">+</button>
          <button class="btn" type="button" id="zoomfit" title="Reset zoom">Fit</button>
          <button class="btn" type="button" id="view" aria-pressed="false">Descent</button>
          <button class="btn" type="button" id="mode" aria-pressed="false">Even tips</button>
          <button class="btn" type="button" id="expand">Expand all</button>
          <button class="btn" type="button" id="collapse">Fold</button>
        </div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="canvas" id="canvas"><svg id="svg"></svg></div>
    </div>
    <aside class="detail" id="detail" aria-live="polite"></aside>
  </div>
</div>

<script>/*__D3__*/</script>
<script id="data" type="application/json">/*__GRAPH__*/</script>
<script>
(function () {
  "use strict";
  var G = JSON.parse(document.getElementById("data").textContent);
  var SVGNS = "http://www.w3.org/2000/svg";

  /* The payload ships as newline-joined blobs and base36 id lists rather than
     JSON arrays: quotes, commas and six-digit decimals cost several megabytes
     across 577k nodes when the whole graph travels inside one HTML file. */
  function nums(s) {
    if (!s) return [];
    var parts = s.split(","), out = new Array(parts.length);
    for (var i = 0; i < parts.length; i++) out[i] = parseInt(parts[i], 36);
    return out;
  }
  var DIGITS = "0123456789abcdefghijklmnopqrstuvwxyz";
  /* Words are front-coded: each line is a shared-prefix length followed by the
     tail. Sorted forms repeat long prefixes (gramer / gramere / grammer), so
     this takes about a third off the largest blob in the payload. */
  var WORDS = (function () {
    var parts = G.words.split("\n"), out = new Array(parts.length), prev = "";
    for (var i = 0; i < parts.length; i++) {
      var s = parts[i];
      var w = prev.slice(0, DIGITS.indexOf(s.charAt(0))) + s.slice(1);
      out[i] = w;
      prev = w;
    }
    return out;
  })();
  var CODES = G.codes, NAMES = G.names;
  var N = WORDS.length;

  /* Glosses are kept only for reconstructed forms. An attested word's meaning
     is usually recoverable from its descendants; *ph₂tḗr's is not. */
  var GLOSS = {};
  (function () {
    var ids = nums(G.gids), txt = G.gtexts ? G.gtexts.split("\n") : [];
    for (var i = 0; i < ids.length; i++) GLOSS[ids[i]] = txt[i];
  })();

  /* Nodes sort by "code:word", so each language is one contiguous run and the
     per-node language list ships as ~3.5k run lengths instead of 577k numbers. */
  var WLANG = new Uint16Array(N);
  (function () {
    var pos = 0, runs = G.wrle.split(",");
    for (var i = 0; i < runs.length; i++) {
      var s = runs[i], c = s.indexOf(":");
      var lang = parseInt(s.slice(0, c), 36), n = parseInt(s.slice(c + 1), 36);
      for (var j = 0; j < n; j++) WLANG[pos++] = lang;
    }
  })();

  /* Relations are not interchangeable, so each edge carries its kind: inherited
     down the family line, borrowed across from another language, or a `root`
     shortcut naming the far end of a chain rather than the next step. Two bits
     per edge, packed, with kinds held parallel to the adjacency arrays so no
     million-entry lookup map is needed. */
  var K_INH = 0, K_BOR = 1, K_ROOT = 2, K_DER = 3;
  var UP = new Array(N), DOWN = new Array(N);
  var UPK = new Array(N), DOWNK = new Array(N);
  (function () {
    var bin = atob(G.kinds);
    var flat = 0, runs = G.adj.split(";");
    for (var i = 0; i < runs.length; i++) {
      var s = runs[i], gt = s.indexOf(">");
      var p = parseInt(s.slice(0, gt), 36);
      var parts = s.slice(gt + 1).split(",");
      var arr = new Array(parts.length), ka = new Array(parts.length);
      for (var j = 0; j < parts.length; j++) {
        var c = parseInt(parts[j], 36);
        var k = (bin.charCodeAt(flat >> 2) >> ((flat & 3) * 2)) & 3;
        arr[j] = c;
        ka[j] = k;
        (UP[c] || (UP[c] = [])).push(p);
        (UPK[c] || (UPK[c] = [])).push(k);
        flat++;
      }
      DOWN[p] = arr;
      DOWNK[p] = ka;
    }
  })();
  function kids(id) { return DOWN[id] || []; }
  function parents(id) { return UP[id] || []; }
  function kindOf(p, c) {
    var a = DOWN[p], k = DOWNK[p];
    if (!a) return K_INH;
    for (var i = 0; i < a.length; i++) if (a[i] === c) return k[i];
    return K_INH;
  }

  function famColour(n) { return "var(--fam-" + famVar(n) + ")"; }

  function subtreeCount(n) {
    var t = 0, stack = [n];
    while (stack.length) {
      var x = stack.pop();
      t += x.children.length;
      for (var i = 0; i < x.children.length; i++) stack.push(x.children[i]);
    }
    return t;
  }
  function findIn(root, id) {
    var stack = [root];
    while (stack.length) {
      var n = stack.pop();
      if (n.id === id) return n;
      for (var i = 0; i < n.children.length; i++) stack.push(n.children[i]);
    }
    return null;
  }
  function viewRoot() {
    if (state.focus !== null) {
      var f = findIn(state.tree.tree, state.focus);
      if (f) return f;
    }
    return state.tree.tree;
  }
  function defaultOpen(root) {
    var open = {};
    open[root.id] = true;
    (function rec(n) {
      var any = false;
      n.children.forEach(function (c) { if (rec(c)) any = true; });
      if (n.path || any) { open[n.id] = true; return true; }
      return false;
    })(root);
    return open;
  }

  /* Label width has to follow the type actually used. The query is set larger
     and the lineage is set bold, so measuring everything at the plain-text rate
     made those labels run under their own language tag. */
  function charW(n) {
    if (state.tree && n.id === state.tree.q) return 9.2;
    return n.path ? 8.2 : 7.7;
  }

  /* Counting JavaScript string length is not counting glyphs, and this tree is
     full of scripts where the two diverge:
       グラマー   4 units, but each kana is about twice as wide as a Latin letter
       вода́      5 units, 4 glyphs — the stress mark hangs on the previous one
       𐍆𐌰𐌳𐌰𐍂     10 units, 5 glyphs — Gothic sits outside the BMP
     Measuring by unit count squeezed CJK labels under their language tag and
     left gaps after accented ones. */
  function textW(s, cw) {
    var w = 0;
    for (var i = 0; i < s.length; i++) {
      var c = s.charCodeAt(i);
      if (c >= 0xD800 && c <= 0xDBFF && i + 1 < s.length) { i++; w += cw; continue; }
      if ((c >= 0x0300 && c <= 0x036F) || (c >= 0x1AB0 && c <= 0x1AFF) ||
          (c >= 0x1DC0 && c <= 0x1DFF) || (c >= 0x20D0 && c <= 0x20FF) ||
          (c >= 0xFE20 && c <= 0xFE2F) || c === 0x200D || c === 0xFE0F) continue;
      if ((c >= 0x1100 && c <= 0x115F) || (c >= 0x2E80 && c <= 0x303E) ||
          (c >= 0x3041 && c <= 0x33FF) || (c >= 0x3400 && c <= 0x4DBF) ||
          (c >= 0x4E00 && c <= 0x9FFF) || (c >= 0xA000 && c <= 0xA4CF) ||
          (c >= 0xAC00 && c <= 0xD7A3) || (c >= 0xF900 && c <= 0xFAFF) ||
          (c >= 0xFE30 && c <= 0xFE6F) || (c >= 0xFF00 && c <= 0xFF60) ||
          (c >= 0xFFE0 && c <= 0xFFE6)) { w += cw * 1.9; continue; }
      w += cw;
    }
    return w;
  }
  function labelW(n) { return textW(labelOf(n.id), charW(n)); }
  function estWidth(n) {
    return labelW(n) + textW(n.lang || n.code, 5.5) + 26 +
           (n.children.length && !isOpen(n) ? 30 : 0);
  }
  /* Components get their own row and their own node, placed one column back so
     they run alongside the lineage and converge into the word they helped make.
     teacher then reads as two strands meeting -- teach coming down the line,
     -er arriving from the side -- which is what actually happened, and which a
     label reading "+er" could only assert. The component is drawn but never
     expanded: -er has thousands of children and belongs to none of them. */
  function visibleHierarchy(root) {
    return (function conv(n) {
      var o = { n: n, more: 0 };
      if (isOpen(n)) {
        o.kids = [];
        shownChildren(n).forEach(function (c) {
          (c.others || []).forEach(function (g) {
            /* Give the component its own lineage rather than a single dot, so
               teacher shows a teach branch and an -er branch of the same kind,
               meeting at the word. */
            var line = componentChain(g), head = null;
            for (var k = line.length - 1; k >= 0; k--) {
              head = { n: c, more: 0, ghost: line[k], gpos: k, glen: line.length,
                       kids: head ? [head] : undefined };
            }
            if (head) o.kids.push(head);
          });
          o.kids.push(conv(c));
        });
        var hid = hiddenCount(n);
        if (hid > 0) o.kids.push({ n: n, more: hid });
      }
      return o;
    })(root);
  }

  /* How a word was made, rather than what came of it.

     A tree has one parent per node, so teacher could only ever hang under teach
     with -er noted at the side -- which says the two were not equals, and they
     were. Here each parent gets the same treatment: its own chain, its own band,
     the same weight, converging on the word. teach arrives from above, -er from
     below, and they meet. */
  function formationOf(id) {
    var ps = UP[id] || [], ks = UPK[id] || [], comps = [];
    for (var i = 0; i < ps.length && comps.length < 4; i++) {
      if (ks[i] !== K_DER || code(ps[i]) !== code(id)) continue;
      comps.push(componentChain(ps[i]));
    }
    return comps.length >= 2 ? comps : null;
  }

  function renderFormation() {
    var T = state.tree, qid = T.q, comps = T.formation;
    var svg = document.getElementById("svg");
    svg.textContent = "";
    var z = state.zoom, stage = svgEl("g", {});

    /* Each part gets the whole tree it deserves, not a single line. A component
       is a word with its own history and its own descendants; drawing it as one
       stroke says otherwise. So lay out a full tree per part, stack them, and
       slide each sideways until the part itself lands in one shared column --
       then the word sits to the right of that column and every branch reaches
       it across the same gap, whatever depth its own history happens to be. */
    var bands = [], joinX = 0, totalH = 0;
    comps.forEach(function (chain) {
      var cid = chain[chain.length - 1];
      var c = climb(cid);
      var route = c ? c.route : [cid];
      var root = route[0];
      var tree = buildTree(root, route, true, -1);
      /* Every part's tree contains the word itself -- Baby descends to
         Antibabypille, and so do Pille and anti- -- so it was drawn once per
         band as well as at the join. It belongs at the join only. */
      (function prune(n) {
        n.children = n.children.filter(function (ch) { return ch.id !== qid; });
        n.children.forEach(prune);
      })(tree);
      var drawn = pathInTree(tree, cid, (function () {
        var w = {};
        route.forEach(function (x) { w[x] = 1; });
        return w;
      })());
      if (drawn) drawn.forEach(function (nd) { nd.path = true; });
      if (state.bandOpen[cid] === undefined) state.bandOpen[cid] = defaultOpen(tree);
      var saved = state.open;
      state.open = state.bandOpen[cid];
      var h = d3.hierarchy(visibleHierarchy(tree), function (x) { return x.kids; });
      (state.tidy ? d3.tree() : d3.cluster()).nodeSize([ROW, 1])(h);
      state.open = saved;
      // colours are per band, worked out from that band's own root
      tagFamilies(tree);
      var famSnapshot = state.fam;

      var all = h.descendants(), minB = Infinity, maxB = -Infinity;
      all.forEach(function (p) {
        if (p.x < minB) minB = p.x;
        if (p.x > maxB) maxB = p.x;
      });
      var maxw = {};
      all.forEach(function (p) {
        var w = p.data.more ? 118 : estWidth(p.data.n);
        maxw[p.depth] = Math.max(maxw[p.depth] || 0, w);
      });
      var colX = {}, acc = 0;
      Object.keys(maxw).map(Number).sort(function (a, b) { return a - b; })
        .forEach(function (dp) { colX[dp] = acc; acc += maxw[dp] + GAP; });
      all.forEach(function (p) { p.sy = p.x - minB; p.sx = colX[p.depth]; });

      var anchor = null;
      all.forEach(function (p) {
        if (!p.data.more && p.data.n.id === cid &&
            (!anchor || p.depth > anchor.depth)) anchor = p;
      });
      if (!anchor) anchor = all[all.length - 1];
      var right = anchor.sx + estWidth(anchor.data.n);
      joinX = Math.max(joinX, right);

      var band = { cid: cid, h: h, all: all, anchor: anchor, colX: colX,
                   maxw: maxw, height: (maxB - minB) + ROW, width: acc,
                   dy: totalH, fam: famSnapshot };
      totalH += band.height + ROW * 1.6;
      bands.push(band);
    });

    bands.forEach(function (b) { b.dx = joinX - (b.anchor.sx + estWidth(b.anchor.data.n)); });

    var wordX = joinX + GAP * 4.5;   // room for the joins to read as arrivals
    var width = wordX + estWidth({ id: qid, word: WORDS[qid], code: code(qid),
                                   lang: langName(qid), children: [] }) + PAD * 2;
    var height = totalH + PAD * 2;
    var midY = PAD + (totalH - ROW * 1.6) / 2;
    if (state.fit) { state.zoom = fitZoom(width, height); state.fit = false; }
    z = state.zoom;

    svg.setAttribute("width", Math.round(width * z));
    svg.setAttribute("height", Math.round(height * z));
    svg.setAttribute("viewBox", "0 0 " + width + " " + height);

    bands.forEach(function (b) {
      var g = svgEl("g", { transform: "translate(" + (b.dx + PAD) + "," + (b.dy + PAD) + ")" });
      state.fam = b.fam;
      drawTreeInto(g, b.all, b.colX, b.maxw, b.cid, state.bandOpen[b.cid]);
      stage.appendChild(g);

      // the part reaches across to the word
      var ax = b.dx + PAD + b.anchor.sx + estWidth(b.anchor.data.n);
      var ay = b.dy + PAD + b.anchor.sy;
      var mx = (ax + wordX) / 2;
      stage.appendChild(svgEl("path", {
        "class": "join",
        d: "M" + ax + "," + ay + "C" + mx + "," + ay + " " + mx + "," + midY +
           " " + (wordX - 6) + "," + midY
      }));
    });

    // the word is what all of this arrives at, so it is drawn to be found
    var gW = svgEl("g", {});
    var qw = textW(labelOf(qid), 11.4);
    gW.appendChild(svgEl("rect", {
      "class": "wordplate",
      x: wordX - 12, y: midY - 17, width: qw + 34, height: 34, rx: 6
    }));
    gW.appendChild(svgEl("circle", {
      "class": "dot wordknot", cx: wordX, cy: midY, r: 5.5
    }));
    var qt = svgEl("text", { "class": "wordlabel", x: wordX + 14, y: midY });
    qt.textContent = labelOf(qid);
    gW.appendChild(qt);
    var qs = svgEl("text", {
      "class": "sub wordsub", x: wordX + 14, y: midY + 21
    });
    qs.textContent = langName(qid);
    gW.appendChild(qs);
    stage.appendChild(gW);
    svg.appendChild(stage);

    var route = document.getElementById("route");
    route.textContent = "";
    comps.forEach(function (c, i) {
      if (i) route.appendChild(el("span", "arrow", "＋"));
      var cid = c[c.length - 1];
      var b = el("button", "step" + (isRecon(cid) ? " recon" : ""));
      b.type = "button";
      b.textContent = labelOf(cid);
      b.addEventListener("click", function () { open(cid); });
      route.appendChild(b);
    });
    route.appendChild(el("span", "arrow", "→"));
    route.appendChild(el("span", "step you", labelOf(qid)));

    if (state.scrollTo) {
      var cv = document.getElementById("canvas");
      cv.scrollLeft = Math.max(0, wordX * z - cv.clientWidth * 0.62);
      cv.scrollTop = Math.max(0, midY * z - cv.clientHeight * 0.5);
      state.scrollTo = false;
    }

    var shown = bands.reduce(function (s, b) { return s + b.all.length; }, 0);
    document.getElementById("meta").textContent =
      comps.length + " parts · " + shown.toLocaleString() + " shown";
    renderDetail(null);
  }

  function findRootOf(h) {
    var r = h;
    while (r.parent) r = r.parent;
    return r.data.n;
  }

  /* Draw a laid-out tree into a group. Shared by the descent view and by each
     band of the formation view, so a component's tree looks exactly like the
     tree you get by opening that component on its own -- which is the point.
     `openMap` is passed in rather than read from state: each band keeps its own
     folding, and a click must reach the band it happened in. */
  function drawTreeInto(g, all, colX, maxw, qid, openMap) {
    var gLinks = svgEl("g", {}), gOn = svgEl("g", {}), gNodes = svgEl("g", {});
    all.forEach(function (p) {
      if (!p.parent) return;
      var a = p.parent, b = p;
      var startX = a.sx + (a.data.more ? 0
        : Math.min(estWidth(a.data.n) - 12, maxw[a.depth]));
      if (startX >= b.sx - 6) startX = a.sx + 6;
      var mid = startX + (b.sx - startX) * 0.5;
      var kind = p.data.more ? K_INH : p.data.n.kind;
      var on = !p.data.more && a.data.n.path && b.data.n.path;
      var reach = p.data.more ? 0 : subtreeCount(p.data.n);
      var wgt = Math.min(2.6, 0.85 + Math.log10(1 + reach) * 0.55);
      (on ? gOn : gLinks).appendChild(svgEl("path", {
        "class": "link" + (on ? " on" : "") + " k" + kind,
        stroke: p.data.more ? "var(--wire)" : famColour(p.data.n),
        "stroke-width": on ? Math.max(1.9, wgt) : wgt,
        "stroke-opacity": on ? 1 : 0.45,
        d: "M" + startX + "," + a.sy + "C" + mid + "," + a.sy +
           " " + mid + "," + b.sy + " " + b.sx + "," + b.sy
      }));
    });
    g.appendChild(gLinks);
    g.appendChild(gOn);

    all.forEach(function (p) {
      if (p.data.more) {
        var t = svgEl("text", { "class": "morerow", x: p.sx, y: p.sy });
        t.textContent = "+ " + p.data.more + " more";
        t.addEventListener("click", function () {
          state.all[p.data.n.id] = true;
          render();
        });
        g.appendChild(t);
        return;
      }
      var n = p.data.n, isYou = n.id === qid, w = estWidth(n);
      var selected = state.sel === n.id;
      var hit = svgEl("rect", {
        "class": "hit", x: p.sx - 8, y: p.sy - ROW / 2 + 2,
        width: Math.max(40, w), height: ROW - 4
      });
      hit.addEventListener("click", function () {
        state.sel = n.id;
        if (n.children.length) openMap[n.id] = !openMap[n.id];
        render();
      });
      gNodes.appendChild(hit);
      gNodes.appendChild(svgEl("rect", {
        "class": "halo" + (selected ? " sel" : ""),
        x: p.sx - 8, y: p.sy - ROW / 2 + 2,
        width: Math.max(40, w), height: ROW - 4, rx: 3
      }));
      var reach = subtreeCount(n), isOpenHere = !!openMap[n.id] && n.children.length > 0;
      gNodes.appendChild(svgEl("circle", {
        "class": "dot", cx: p.sx, cy: p.sy,
        r: isYou ? DOT + 1.6 : Math.min(DOT + 2, DOT + Math.log10(1 + reach) * 0.7),
        fill: n.children.length && !isOpenHere ? famColour(n) : "var(--canvas)",
        stroke: n.path ? "var(--accent)" : famColour(n)
      }));
      var lw = labelW(n);
      var t2 = svgEl("text", {
        "class": "lbl" + (isRecon(n.id) ? " recon" : "") +
                 (n.path ? " on" : "") + (isYou ? " you" : ""),
        x: p.sx + 9, y: p.sy
      });
      t2.textContent = labelOf(n.id);
      gNodes.appendChild(t2);
      var s = svgEl("text", { "class": "sub", x: p.sx + 17 + lw, y: p.sy + 0.5 });
      s.textContent = n.lang || n.code;
      gNodes.appendChild(s);
      if (n.children.length && !isOpenHere) {
        var c = svgEl("text", {
          "class": "more",
          x: p.sx + 24 + lw + textW(n.lang || n.code, 5.5), y: p.sy + 0.5
        });
        c.textContent = "+" + reach;
        gNodes.appendChild(c);
      }
    });
    g.appendChild(gNodes);
  }

  function render() {
    if (state.mode === "form" && state.tree && state.tree.formation) {
      renderFormation();
      return;
    }
    var T = state.tree, root = viewRoot();
    var h = d3.hierarchy(visibleHierarchy(root), function (x) { return x.kids; });
    (state.tidy ? d3.tree() : d3.cluster()).nodeSize([ROW, 1])(h);

    var all = h.descendants();
    var minB = Infinity, maxB = -Infinity;
    all.forEach(function (p) {
      if (p.x < minB) minB = p.x;
      if (p.x > maxB) maxB = p.x;
    });

    var maxw = {};
    all.forEach(function (p) {
      if (p.data.ghost !== undefined) {
        var gd = ghostDepth(p);
        maxw[gd] = Math.max(maxw[gd] || 0, textW(labelOf(p.data.ghost), 7.2) + 40);
        return;
      }
      var w = p.data.more ? 118 : estWidth(p.data.n);
      maxw[p.depth] = Math.max(maxw[p.depth] || 0, w);
    });
    var colX = {}, acc = PAD;
    var depths = Object.keys(maxw).map(Number).sort(function (a, b) { return a - b; });
    depths.forEach(function (dp) { colX[dp] = acc; acc += maxw[dp] + GAP; });

    var width = acc + PAD, height = (maxB - minB) + PAD * 2;
    if (state.fit) { state.zoom = fitZoom(width, height); state.fit = false; }
    all.forEach(function (p) {
      p.sy = p.x - minB + PAD;
      p.sx = colX[p.data.ghost === undefined ? p.depth : ghostDepth(p)];
    });

    var svg = document.getElementById("svg");
    svg.textContent = "";
    /* Zoom by scaling one wrapping group and sizing the SVG to match, rather
       than by CSS transform on the element: the canvas scrolls, and the
       scrollable area has to grow with the drawing or half of it becomes
       unreachable at higher magnifications. */
    var z = state.zoom;
    svg.setAttribute("width", Math.round(width * z));
    svg.setAttribute("height", Math.round(height * z));
    svg.setAttribute("viewBox", "0 0 " + width + " " + height);
    var stage = svgEl("g", {});

    var gGuide = svgEl("g", {});
    depths.forEach(function (dp) {
      if (!dp) return;
      gGuide.appendChild(svgEl("line", {
        "class": "guide", x1: colX[dp] - GAP / 2, y1: 0, x2: colX[dp] - GAP / 2, y2: height
      }));
    });
    stage.appendChild(gGuide);

    /* Each link starts just past its own parent's label rather than at the dot,
       so a branch never strikes through the word it comes from. Weight tracks
       how much hangs off the branch, colour marks the family. */
    var gLinks = svgEl("g", {}), gOn = svgEl("g", {});
    all.forEach(function (p) {
      if (!p.parent || p.data.ghost !== undefined) return;
      var a = p.parent, b = p;
      var startX = a.sx + (a.data.more ? 0 : Math.min(estWidth(a.data.n) - 12, maxw[a.depth]));
      if (startX >= b.sx - 6) startX = a.sx + 6;
      var mid = startX + (b.sx - startX) * 0.5;
      /* The relation used to be written on the line as the word "borrowed",
         which collided with every neighbouring label once branches crowded.
         The stroke pattern carries it instead, explained once in the legend. */
      var kind = p.data.more ? K_INH : p.data.n.kind;
      var on = !p.data.more && a.data.n.path && b.data.n.path;
      var reach = p.data.more ? 0 : subtreeCount(p.data.n);
      var wgt = Math.min(2.6, 0.85 + Math.log10(1 + reach) * 0.55);
      (on ? gOn : gLinks).appendChild(svgEl("path", {
        "class": "link" + (on ? " on" : "") + " k" + kind,
        stroke: p.data.more ? "var(--wire)" : famColour(p.data.n),
        "stroke-width": on ? Math.max(1.9, wgt) : wgt,
        "stroke-opacity": on ? 1 : 0.45,
        d: "M" + startX + "," + a.sy + "C" + mid + "," + a.sy +
           " " + mid + "," + b.sy + " " + b.sx + "," + b.sy
      }));
    });
    stage.appendChild(gLinks);
    stage.appendChild(gOn);

    /* Each component has a row and a node of its own, one column back, and a
       curve running from it into the word it helped make. Two strands meeting,
       which is what actually happened -- a label reading "+er" could only
       assert it. */
    var target = new Map();
    all.forEach(function (p) {
      if (p.data.ghost === undefined && !p.data.more) target.set(p.data.n, p);
    });
    var gMerge = svgEl("g", {});
    all.forEach(function (p) {
      if (p.data.ghost === undefined) return;
      // the branch runs along itself, then its last node curves into the word
      var to = (p.data.gpos === p.data.glen - 1) ? target.get(p.data.n)
             : all.find(function (q) {
                 return q.parent === p && q.data.ghost !== undefined;
               });
      if (!to) return;
      var mx = (p.sx + to.sx) / 2;
      gMerge.appendChild(svgEl("path", {
        "class": "merge",
        d: "M" + (p.sx + 5) + "," + p.sy +
           "C" + mx + "," + p.sy + " " + mx + "," + to.sy +
           " " + (to.sx - 3) + "," + to.sy
      }));
    });
    stage.appendChild(gMerge);

    var gNodes = svgEl("g", {});
    all.forEach(function (p) {
      if (p.data.ghost !== undefined) {
        var gid = p.data.ghost;
        gNodes.appendChild(svgEl("circle", {
          "class": "dot ghostdot", cx: p.sx, cy: p.sy, r: 2.6,
          fill: "var(--canvas)", stroke: "var(--accent)"
        }));
        var gl = svgEl("text", {
          "class": "lbl ghost" + (isRecon(gid) ? " recon" : ""),
          x: p.sx + 8, y: p.sy
        });
        gl.textContent = labelOf(gid);
        gl.addEventListener("click", function () { open(gid); });
        gNodes.appendChild(gl);
        var gsub = svgEl("text", {
          "class": "sub", x: p.sx + 14 + textW(labelOf(gid), 7.2), y: p.sy + 0.5
        });
        gsub.textContent = isAffix(gid) ? "affix" : langName(gid);
        gNodes.appendChild(gsub);
        return;
      }
      if (p.data.more) {
        var t = svgEl("text", { "class": "morerow", x: p.sx, y: p.sy });
        t.textContent = "+ " + p.data.more + " more";
        t.addEventListener("click", function () { state.all[p.data.n.id] = true; render(); });
        gNodes.appendChild(t);
        return;
      }
      var n = p.data.n, isYou = n.id === T.q, w = estWidth(n), selected = state.sel === n.id;

      var hit = svgEl("rect", {
        "class": "hit", x: p.sx - 8, y: p.sy - ROW / 2 + 2,
        width: Math.max(40, w), height: ROW - 4
      });
      if (selected) hit.setAttribute("data-sel", "1");
      hit.addEventListener("click", function () {
        state.sel = n.id;
        if (n.children.length) state.open[n.id] = !state.open[n.id];
        render();
      });
      gNodes.appendChild(hit);
      gNodes.appendChild(svgEl("rect", {
        "class": "halo" + (selected ? " sel" : ""),
        x: p.sx - 8, y: p.sy - ROW / 2 + 2,
        width: Math.max(40, w), height: ROW - 4, rx: 3
      }));

      var reach = subtreeCount(n);
      gNodes.appendChild(svgEl("circle", {
        "class": "dot", cx: p.sx, cy: p.sy,
        r: isYou ? DOT + 1.6 : Math.min(DOT + 2, DOT + Math.log10(1 + reach) * 0.7),
        fill: n.children.length && !isOpen(n) ? famColour(n) : "var(--canvas)",
        stroke: n.path ? "var(--accent)" : famColour(n)
      }));

      var lw = labelW(n);
      var t2 = svgEl("text", {
        "class": "lbl" + (isRecon(n.id) ? " recon" : "") + (n.path ? " on" : "") + (isYou ? " you" : ""),
        x: p.sx + 9, y: p.sy
      });
      t2.textContent = labelOf(n.id);
      gNodes.appendChild(t2);

      var s = svgEl("text", { "class": "sub", x: p.sx + 17 + lw, y: p.sy + 0.5 });
      s.textContent = n.lang || n.code;
      gNodes.appendChild(s);

      var tail = p.sx + 24 + lw + textW(n.lang || n.code, 5.5);
      if (n.children.length && !isOpen(n)) {
        var c = svgEl("text", { "class": "more", x: tail, y: p.sy + 0.5 });
        c.textContent = "+" + reach;
        gNodes.appendChild(c);
        tail += textW("+" + reach, 6.4) + 10;
      }

    });
    stage.appendChild(gNodes);

    /* Show the whole lineage, not just its two ends: the stages in between are
       the interesting part, and each one is a word you can open in its own right. */
    svg.appendChild(stage);

    var route = document.getElementById("route");
    route.textContent = "";
    (T.chain || [T.q]).forEach(function (step, i) {
      if (i) route.appendChild(el("span", "arrow", "→"));
      var b = el("button", "step" + (i === 0 ? " root" : "") +
                            (step === T.q ? " you" : "") +
                            (isRecon(step) ? " recon" : ""));
      b.type = "button";
      b.title = langName(step);
      b.textContent = labelOf(step);
      b.addEventListener("click", function () { open(step); });
      route.appendChild(b);

      /* Name the parts a step was built from, right in the chain. The lineage
         cannot route through an affix, so teacher reads "teach → teacher" and
         the -er that actually shapes the word appears nowhere. Say it here. */
      var prev = i ? (T.chain || [])[i - 1] : -1;
      var ps = UP[step] || [], ks = UPK[step] || [], parts = [];
      for (var pi = 0; pi < ps.length && parts.length < 3; pi++) {
        if (ks[pi] !== K_DER || code(ps[pi]) !== code(step) || ps[pi] === prev) continue;
        parts.push(ps[pi]);
      }
      parts.forEach(function (o) {
        var pb = el("button", "part");
        pb.type = "button";
        pb.textContent = "＋" + labelOf(o);
        pb.title = langName(o) + (isAffix(o) ? " · affix" : " · component");
        pb.addEventListener("click", function () { open(o); });
        route.appendChild(pb);
      });
    });
    if (state.focus !== null) {
      var back = el("button", "crumb", "↑ back to " + labelOf(T.tree.id));
      back.type = "button";
      back.addEventListener("click", function () {
        state.focus = null;
        state.open = defaultOpen(T.tree);
        render();
      });
      route.appendChild(document.createTextNode(" "));
      route.appendChild(back);
    }

    if (state.scrollTo) {
      var you = null;
      all.forEach(function (p) { if (!p.data.more && p.data.n.id === T.q) you = p; });
      if (you) {
        var cv2 = document.getElementById("canvas");
        cv2.scrollLeft = Math.max(0, you.sx * z - cv2.clientWidth * 0.55);
        cv2.scrollTop = Math.max(0, you.sy * z - cv2.clientHeight * 0.45);
      }
      state.scrollTo = false;
    }

    var langs = {};
    (function count(n) { langs[n.code] = 1; n.children.forEach(count); })(T.tree);
    document.getElementById("meta").textContent =
      all.length.toLocaleString() + " shown · " + subtreeCount(T.tree).toLocaleString() +
      " in tree · " + Object.keys(langs).length + " languages";

    renderDetail(h);
  }

  function renderDetail(h) {
    var box = document.getElementById("detail");
    box.textContent = "";
    box.appendChild(el("h2", null, "Node"));

    var found = null;
    if (h) {
      h.descendants().forEach(function (p) {
        if (!p.data.more && p.data.n.id === state.sel) found = p;
      });
    }

    if (!found) {
      box.appendChild(el("p", "placeholder",
        "Click any node to inspect it — its meaning, its era, the line it descends " +
        "through, and how much grew out of it. Every word here is also a valid " +
        "starting point: search for it, or open its own tree."));
    } else {
      var n = found.data.n;
      box.appendChild(el("div", "d-form" + (isRecon(n.id) ? " recon" : ""), labelOf(n.id)));
      var lang = el("div", "d-lang");
      var sw = el("span", "swatch");
      sw.style.setProperty("--c", famColour(n));
      lang.appendChild(sw);
      lang.appendChild(document.createTextNode(
        (n.lang || n.code) + (ERA[n.code] ? " · " + ERA[n.code] : "")));
      box.appendChild(lang);
      if (n.gloss) box.appendChild(el("div", "d-gloss", n.gloss));

      var facts = el("div", "d-sec");
      facts.appendChild(el("h3", null, "Reach"));
      var dl = el("dl", "facts");
      var arrived = n.kind === K_BOR ? "borrowing"
        : n.kind === K_ROOT ? "a root citation"
        : n.kind === K_DER ? "word-formation"
        : "inheritance";
      [["Direct children", kids(n.id).length],
       ["All descendants", reachCount(n.id)],
       ["Recorded parents", parents(n.id).length],
       ["Family", FAMNAME[famVar(n)] || famVar(n)],
       ["Arrived by", arrived]].forEach(function (r) {
        dl.appendChild(el("dt", null, r[0]));
        dl.appendChild(el("dd", null, String(r[1])));
      });
      facts.appendChild(dl);
      box.appendChild(facts);

      /* Anything drawn at the top of the tree still has recorded parents; not
         showing them reads as "this word came from nowhere". */
      var ups = [];
      var pl = UP[n.id] || [], kl = UPK[n.id] || [];
      for (var pi = 0; pi < pl.length; pi++) {
        if (kl[pi] !== K_ROOT) ups.push({ id: pl[pi], kind: kl[pi] });
      }
      if (ups.length) {
        var built = ups.filter(function (u) {
          return u.kind === K_DER && code(u.id) === n.code;
        }).length === ups.length;
        var us = el("div", "d-sec");
        us.appendChild(el("h3", null, built ? "Built from" : "Comes from"));
        var uw = el("div", "lineage");
        ups.slice(0, 12).forEach(function (u) {
          var b = el("button", isRecon(u.id) ? "recon" : null);
          b.type = "button";
          if (GLOSS[u.id]) b.title = GLOSS[u.id];
          b.appendChild(document.createTextNode(labelOf(u.id)));
          b.appendChild(el("span", "who", langName(u.id) +
            (u.kind === K_BOR ? " · borrowed" :
             u.kind === K_DER && code(u.id) === n.code ? " · part" : "")));
          b.addEventListener("click", function () { open(u.id); });
          uw.appendChild(b);
        });
        us.appendChild(uw);
        box.appendChild(us);
      }

      var lin = el("div", "d-sec");
      lin.appendChild(el("h3", null, "Descends through"));
      var wrap = el("div", "lineage");
      found.ancestors().reverse().forEach(function (a) {
        var an = a.data.n;
        var b = el("button", (a === found ? "here " : "") + (isRecon(an.id) ? "recon" : ""));
        b.type = "button";
        b.appendChild(document.createTextNode(labelOf(an.id)));
        b.appendChild(el("span", "who", an.lang || an.code));
        b.addEventListener("click", function () { state.sel = an.id; render(); });
        wrap.appendChild(b);
      });
      lin.appendChild(wrap);
      box.appendChild(lin);

      var acts = el("div", "acts");
      if (n.children.length) {
        var focus = el("button", "btn primary", "Focus on this branch");
        focus.type = "button";
        focus.addEventListener("click", function () {
          state.focus = n.id;
          state.open = {};
          state.open[n.id] = true;
          n.children.forEach(function (c) { state.open[c.id] = true; });
          render();
        });
        acts.appendChild(focus);
      }
      if (n.id !== state.tree.q) {
        var jump = el("button", "btn", "Trace this word");
        jump.type = "button";
        jump.addEventListener("click", function () { open(n.id); });
        acts.appendChild(jump);
      }
      box.appendChild(acts);
    }

    if (!h) return;
    var present = {}, kindsSeen = {};
    h.descendants().forEach(function (p) {
      if (p.data.more) return;
      present[famVar(p.data.n)] = 1;
      if (p.parent) kindsSeen[p.data.n.kind] = 1;
    });

    /* Slot 3 covers both "derived from another language" and "built from parts
       of this one". They need no separate bit: word-formation is always
       same-language, so the two language codes tell them apart. */
    var anyForm = false, anyDer = false;
    h.descendants().forEach(function (p) {
      if (p.data.more || !p.parent || p.data.n.kind !== K_DER) return;
      if (p.parent.data.more) return;
      if (p.parent.data.n.code === p.data.n.code) anyForm = true; else anyDer = true;
    });
    var lines = el("div", "legend");
    lines.appendChild(el("h3", null, "Lines"));
    [[K_INH, "inherited"], [K_BOR, "borrowed"],
     [K_DER, anyForm && !anyDer ? "built from" :
             anyForm ? "derived / built from" : "derived from"],
     [K_ROOT, "root"]].forEach(function (r) {
      if (!kindsSeen[r[0]]) return;
      var s2 = el("span", "lkey");
      var svg = svgEl("svg", { width: 26, height: 8, viewBox: "0 0 26 8" });
      svg.appendChild(svgEl("path", {
        "class": "link k" + r[0], d: "M0,4H26",
        stroke: "var(--wire)", "stroke-width": 1.6
      }));
      s2.appendChild(svg);
      s2.appendChild(document.createTextNode(r[1]));
      lines.appendChild(s2);
    });
    if (lines.childNodes.length > 1) box.appendChild(lines);

    var leg = el("div", "legend");
    leg.appendChild(el("h3", null, "Branches"));
    Object.keys(present).forEach(function (f) {
      var s2 = el("span");
      var i = el("i");
      i.style.setProperty("--c", "var(--fam-" + f + ")");
      s2.appendChild(i);
      s2.appendChild(document.createTextNode(FAMNAME[f] || f));
      leg.appendChild(s2);
    });
    box.appendChild(leg);
  }

  function open(id, forceRoot) {
    state.tree = treeFor(id, forceRoot);
    // a word made of parts opens on how it was made; everything else on descent
    state.mode = (state.tree.formation && forceRoot === undefined) ? "form" : "tree";
    syncModeButton();
    state.focus = null;
    state.sel = id;
    tagFamilies(state.tree.tree);
    state.open = defaultOpen(state.tree.tree);
    state.all = {};
    state.bandOpen = {};
    state.fit = true;          // a new word is sized to be read, not inherited
    state.scrollTo = true;     // and brought into view rather than left off-screen
    render();

    Array.prototype.forEach.call(document.querySelectorAll(".chip"), function (c) {
      c.setAttribute("aria-pressed", String(+c.dataset.id === id));
    });
    // scrolling is handled by render, which knows where the word ended up
  }

  /* ---- search UI ----------------------------------------------------- */
  var qEl = document.getElementById("q"), resBox = document.getElementById("results");
  var cur = -1, hits = [];

  function paintResults() {
    resBox.textContent = "";
    if (!hits.length) {
      if (qEl.value.trim()) resBox.appendChild(el("div", "nores", "No word matches that."));
      return;
    }
    hits.forEach(function (id, i) {
      var b = el("button", "res" + (i === cur ? " cur" : ""));
      b.type = "button";
      var sw = el("span", "swatch");
      sw.style.setProperty("--c", "var(--fam-" + (FAMVAR[code(id)] || "oth") + ")");
      b.appendChild(sw);
      b.appendChild(el("span", "w" + (isRecon(id) ? " recon" : ""), labelOf(id)));
      b.appendChild(el("span", "lg", langName(id)));
      if (GLOSS[id]) b.appendChild(el("span", "gl", GLOSS[id]));
      /* Two entries can be spelt the same in the same language -- sugar the
         noun and Sugar the surname -- and without glosses they read alike.
         Reach tells them apart: 24 descendants against one. */
      var n = kids(id).length;
      if (n) b.appendChild(el("span", "cnt", n + (n === 1 ? " descendant" : " descendants")));
      b.addEventListener("click", function () {
        open(id); resBox.textContent = ""; qEl.blur();
      });
      resBox.appendChild(b);
    });
  }
  qEl.addEventListener("input", function () {
    hits = search(qEl.value);
    cur = hits.length ? 0 : -1;
    paintResults();
  });
  qEl.addEventListener("keydown", function (e) {
    if (e.key === "ArrowDown") { cur = Math.min(cur + 1, hits.length - 1); paintResults(); e.preventDefault(); }
    else if (e.key === "ArrowUp") { cur = Math.max(cur - 1, 0); paintResults(); e.preventDefault(); }
    else if (e.key === "Enter" && hits[cur] !== undefined) {
      open(hits[cur]); resBox.textContent = ""; qEl.blur();
    } else if (e.key === "Escape") { resBox.textContent = ""; qEl.blur(); }
  });
  document.addEventListener("click", function (e) {
    if (!e.target.closest || !e.target.closest(".search")) resBox.textContent = "";
  });

  /* Fit on open, so a word arrives at a size you can read.

     Width is what decides it: a tree can be thousands of pixels tall and
     scrolling down it is normal, but scrolling sideways to find the word you
     searched for is not. Floored so a sprawling tree never shrinks to
     illegibility, capped so a two-word etymology is not blown up absurdly. */
  function fitZoom(width, height) {
    var cv = document.getElementById("canvas");
    var w = cv.clientWidth || 900;
    var z = (w - 28) / Math.max(1, width);
    /* Floored where the type is still readable rather than where the drawing
       happens to fit. Squeezing Antibabypille into the window took the labels
       down to 7px, which shows you everything and tells you nothing; a wide
       tree is better scrolled than shrunk, so the view scrolls to the word
       instead. */
    return Math.max(0.78, Math.min(1.6, z));
  }

  function setZoom(z, anchor) {
    var canvas = document.getElementById("canvas");
    var prev = state.zoom;
    state.zoom = Math.max(0.25, Math.min(4, z));
    // keep whatever was under the pointer (or the middle) where it was
    var ax = anchor ? anchor.x : canvas.clientWidth / 2;
    var ay = anchor ? anchor.y : canvas.clientHeight / 2;
    var fx = (canvas.scrollLeft + ax) / prev;
    var fy = (canvas.scrollTop + ay) / prev;
    render();
    canvas.scrollLeft = fx * state.zoom - ax;
    canvas.scrollTop = fy * state.zoom - ay;
  }
  document.getElementById("zoomin").addEventListener("click", function () { setZoom(state.zoom * 1.25); });
  document.getElementById("zoomout").addEventListener("click", function () { setZoom(state.zoom / 1.25); });
  document.getElementById("zoomfit").addEventListener("click", function () {
    state.fit = true;
    state.scrollTo = true;
    render();
  });
  document.getElementById("canvas").addEventListener("wheel", function (e) {
    if (!e.ctrlKey && !e.metaKey) return;      // plain wheel still scrolls
    e.preventDefault();
    var r = this.getBoundingClientRect();
    setZoom(state.zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12),
            { x: e.clientX - r.left, y: e.clientY - r.top });
  }, { passive: false });
  document.addEventListener("keydown", function (e) {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "+" || e.key === "=") { setZoom(state.zoom * 1.25); e.preventDefault(); }
    else if (e.key === "-") { setZoom(state.zoom / 1.25); e.preventDefault(); }
    else if (e.key === "0") { setZoom(1); e.preventDefault(); }
  });

  function syncModeButton() {
    var b = document.getElementById("view");
    var can = !!(state.tree && state.tree.formation);
    b.style.display = can ? "" : "none";
    b.textContent = state.mode === "form" ? "Descent" : "How it was formed";
    b.setAttribute("aria-pressed", String(state.mode === "form"));
  }
  document.getElementById("view").addEventListener("click", function () {
    state.mode = state.mode === "form" ? "tree" : "form";
    syncModeButton();
    render();
  });

  document.getElementById("mode").addEventListener("click", function () {
    state.tidy = !state.tidy;
    this.textContent = state.tidy ? "Even tips" : "Pack tight";
    this.setAttribute("aria-pressed", String(!state.tidy));
    render();
  });
  document.getElementById("expand").addEventListener("click", function () {
    (function rec(n) {
      if (n.children.length) { state.open[n.id] = true; state.all[n.id] = true; }
      n.children.forEach(rec);
    })(viewRoot());
    render();
  });
  document.getElementById("collapse").addEventListener("click", function () {
    state.open = {}; state.all = {};
    state.open[viewRoot().id] = true;
    render();
  });

  /* ---- examples ------------------------------------------------------ */
  var KEYIDX = {};
  for (var i = 0; i < N; i++) {
    // homographs share a spelling; keep the first, which is etymology 1
    if (KEYIDX[keyOf(i)] === undefined) KEYIDX[keyOf(i)] = i;
  }

  var picker = document.getElementById("picker");
  ["en:father", "en:water", "en:night", "en:star", "en:wheel",
   "la:pater", "grc:πατήρ", "sa:पितृ", "ru:вода́", "hy:հայր",
   "ga:athair", "is:hjarta", "cy:mam", "sq:natë"].forEach(function (k) {
    var id = KEYIDX[k];
    if (id === undefined) return;
    var b = el("chip" === "" ? "span" : "button", "chip");
    b.type = "button";
    b.dataset.id = id;
    b.setAttribute("aria-pressed", "false");
    b.appendChild(el("span", "code", k.split(":")[0]));
    b.appendChild(document.createTextNode(WORDS[id]));
    b.title = langName(id);
    b.addEventListener("click", function () { open(id); });
    picker.appendChild(b);
  });

  open(KEYIDX["en:father"] !== undefined ? KEYIDX["en:father"] : 0);
})();
</script>
